<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <title>{% block title %}My Flask Site{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container-fluid">
        <header>
            <h1 class="text-center py-3 site-title">The Diehl Menu</h1>
            <nav class="navbar navbar-light bg-light py-2">
                <div class="container d-flex justify-content-center">
                    <div class="nav-buttons-container">
                        <a class="btn btn-sm nav-btn {% if active_page == 'home' %}btn-primary{% else %}btn-outline-primary{% endif %}" href="{{ url_for('index') }}">Shopping List</a>
                        <a class="btn btn-sm nav-btn {% if active_page == 'recipes_list' %}btn-primary{% else %}btn-outline-primary{% endif %}" href="{{ url_for('recipes_list') }}">Recipes</a>
                        <a class="btn btn-sm nav-btn {% if active_page == 'import' %}btn-primary{% else %}btn-outline-primary{% endif %}" href="{{ url_for('import_page') }}">Import Recipe</a>
                    </div>
                </div>
            </nav>
        </header>
    
        <main>
            {% block content %}{% endblock %}
        </main>
    
        <footer>
            <p>&copy; 2025 Spencer Diehl</p>
        </footer>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
</body>
</html>
