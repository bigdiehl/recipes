# Food registry
# -------------
# Each entry defines a known food and how it should behave on shopping lists.
#
# Fields:
#   names           (required) List of aliases. The first name is the name used on the shopping
#                   list. Names are case-insensitive. Fuzzy name matching is used, so it is not
#                   necessary to include the plural of the name.
#   category        (required) One of: MEAT, DAIRY, VEGETABLE, FRUIT, SPICE, BAKING, OTHER
#   preferred_unit  Unit to convert quantities to on the shopping list (e.g. cup, lb).
#                   Must be a unit recognised by Pint.
#   min_amount      Minimum quantity (in preferred_unit) worth adding to the list.
#   likely_to_have  true = ingredient will be moved to the secondary 'probably already have this'
#                   section in the generated shopping list.

